<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <script src="main.js" defer></script>
  <title>Contact Form</title>
</head>

<body>


  <div>

    <h1>Contact form</h1>
  </div>

  <!-- Formular de Înregistrare -->
  <div class="card" id="registerCard">
    <h2>Înregistrează un cont</h2>
    <form id="registerForm">
      <div class="form-group">
        <input type="text" id="firstName" name="firstName" placeholder="Prenume" required>
      </div>
      <div class="form-group">
        <input type="text" id="lastName" name="lastName" placeholder="Nume" required>
      </div>
      <div class="form-group">
        <input type="email" id="emailReg" name="email" placeholder="Email" required>
      </div>
      <div class="form-group">
        <input type="password" id="passwordReg" name="password" placeholder="Parola" required>
      </div>
      <div class="form-group">
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirmă parola" required>
      </div>
      <button type="submit">Înregistrează-te</button>
      <p id="statusReg" class="status"></p>
    </form>
  </div>

  <!-- Formular de Autentificare -->
  <div class="card" id="loginCard">
    <h2>Autentificare</h2>
    <form id="loginForm">
      <div class="form-group">
        <input type="email" id="emailLogin" name="emailLogin" placeholder="Email" required>
      </div>
      <div class="form-group">
        <input type="password" id="passwordLogin" name="passwordLogin" placeholder="Parola" required>
      </div>
      <button type="submit">Autentifică-te</button>
      <p id="statusLogin" class="status"></p>
    </form>
  </div>

  <!-- Mesaj de bun venit -->
  <div id="welcomeMessage" style="display:none;"></div>



</body>

</html>
